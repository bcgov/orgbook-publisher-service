{{- if and .Values.mongodb.enabled .Values.mongodb.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "global.fullname" . }}-db
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mongodb.podSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.mongodb.networkPolicy.extraEgress }}
    - Egress
    {{- end }}
  ingress:
    # Allow inbound traffic from the backend pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mongodb.service.port | default 27017 }}
    {{- if .Values.mongodb.replicaSet.enabled }}
    # Allow traffic between MongoDB replica set members
    - from:
        - podSelector:
            matchLabels:
              {{- include "mongodb.podSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mongodb.service.port | default 27017 }}
    {{- end }}
    {{- with .Values.mongodb.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.mongodb.networkPolicy.extraEgress }}
  egress:
    {{- toYaml .Values.mongodb.networkPolicy.extraEgress | nindent 4 }}
  {{- end }}
{{- end }}
