---
# -- String to partially override the chart name
nameOverride: "orgbook-publisher"
# -- String to fully override the chart name
fullnameOverride: "orgbook-publisher"

ingress:
  # -- Enable the Ingress resource
  enabled: true
  # -- TLS configuration for the ingress
  tls: []
  # -- Additional labels for the ingress resource
  labels: {}
  # -- Annotations for the ingress resource
  annotations: {}

networkPolicy:
  ingress:
    # -- Namespace selector labels for the backend ingress network policy
    namespaceSelector: {}

# -- @default -- See sub-values
backend:
  # -- Backend hostname used for the Ingress rule and DOMAIN env var
  host: ""

  environment:
    # -- OrgBook API URL
    ORGBOOK_URL: ""
    # -- Publisher multikey
    PUBLISHER_MULTIKEY: ""
    # -- Issuer registry URL
    ISSUER_REGISTRY_URL: ""
    # -- Traction API URL
    TRACTION_API_URL: ""
    # -- DID Web Server URL
    DID_WEB_SERVER_URL: ""

  image:
    # -- Backend image repository
    repository: ghcr.io/bcgov/orgbook-publisher-service
    # -- Backend image tag
    tag: v0.0.2
    # -- Backend image pull policy
    pullPolicy: IfNotPresent
    # -- Backend image pull secrets
    pullSecrets: []

  # -- Number of backend replicas
  replicaCount: 1

  # -- Annotations for backend pods
  podAnnotations: {}
  # -- Security context for backend pods
  podSecurityContext: {}
  # -- Security context for backend containers
  containerSecurityContext: {}

  service:
    # -- Backend service type
    type: ClusterIP
    # -- Backend API container port
    apiPort: 8000
    # -- Backend service port
    servicePort: 8000

  resources:
    limits:
      # -- CPU limit for backend
      cpu: 100m
      # -- Memory limit for backend
      memory: 512Mi
    requests:
      # -- CPU request for backend
      cpu: 10m
      # -- Memory request for backend
      memory: 128Mi

  networkPolicy:
    ingress:
      # -- Pod selector labels for the backend ingress network policy
      podSelector: {}

# @section MongoDB Subchart Configuration
#
# Overrides for CloudPirates MongoDB chart
# ref: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/mongodb

# -- @default -- See sub-values
mongodb:
  # -- Enable bundled MongoDB subchart
  enabled: true

  image:
    # -- MongoDB image registry
    registry: docker.io
    # -- MongoDB image repository
    repository: mongo
    # -- MongoDB image tag
    tag: "8.0"
    # -- MongoDB image pull policy
    pullPolicy: IfNotPresent

  # -- Target platform for MongoDB deployment. Set to "openshift" for OpenShift compatibility.
  targetPlatform: ""

  auth:
    # -- Enable MongoDB authentication
    enabled: true
    # -- MongoDB root username
    rootUsername: "admin"

  # Custom user configuration.
  # CloudPirates MongoDB creates the user via init script using the secret keys below.
  customUser:
    # -- Name of the custom MongoDB user
    name: "orgbook-publisher"
    # -- Name of the MongoDB database
    database: "orgbook-publisher"
    # -- Name of an existing secret for custom-user credentials.
    # Leave empty to let the subchart generate its own credentials secret.
    # When set, the subchart uses this secret instead of generating one, and the
    # backend deployment reads credentials from this secret.
    existingSecret: ""
    # -- Secret key names in the custom-user secret. Defaults match the CloudPirates subchart's generated secret keys.
    secretKeys:
      name: "CUSTOM_USER"
      password: "CUSTOM_PASSWORD"
      database: "CUSTOM_DB"

  # -- Labels added to all MongoDB resources
  # @default -- `{ app.kubernetes.io/role: database }`
  commonLabels:
    app.kubernetes.io/role: database

  networkPolicy:
    # -- Enable NetworkPolicy for MongoDB pods
    enabled: true
    # -- Additional ingress rules appended to the default backend→db and inter-pod rules
    extraIngress: []
    # -- Egress rules. When non-empty, policyType: Egress is added and only the listed
    # rules are allowed. Leave empty to keep egress unrestricted (Kubernetes default).
    extraEgress: []

  replicaSet:
    # -- Enable MongoDB replica set mode (standalone if false)
    enabled: false
  service:
    # -- MongoDB service type
    type: ClusterIP
    # -- MongoDB service port
    port: 27017
  # -- Set MongoDB container security context
  # @default -- `{}`
  containerSecurityContext: {}
  # -- Set MongoDB pod security context
  # @default -- `{}`
  podSecurityContext: {}
  persistence:
    # -- Enable MongoDB data persistence using PVC
    enabled: true
    # -- PVC Storage Class for MongoDB data volume
    storageClass: ""
    # -- PVC Storage size for MongoDB data volume
    size: 8Gi
